<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoZi Admin - Add Listing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>CoZi Admin</h1>

    <form id="listingForm" class="card">
      <section class="admin-image-upload">
        <div class="admin-image-upload__copy">
          <p class="section-label">Listing Photos</p>
          <p class="admin-image-upload__hint">
            Upload up to 5 images using these fixed labels: bedroom, bathroom, kitchen, living room, and cover photo.
          </p>
        </div>

        <div class="admin-image-grid">
          <div class="admin-image-slot">
            <label class="admin-image-slot__field">
              <span class="admin-image-slot__label">Bedroom</span>
              <input type="file" accept="image/*" data-image-label="bedroom" />
              <div class="admin-image-slot__preview" data-image-preview="bedroom">No bedroom photo uploaded.</div>
            </label>
            <button type="button" class="button-ghost admin-image-slot__remove" data-image-remove="bedroom">Remove Photo</button>
          </div>

          <div class="admin-image-slot">
            <label class="admin-image-slot__field">
              <span class="admin-image-slot__label">Bathroom</span>
              <input type="file" accept="image/*" data-image-label="bathroom" />
              <div class="admin-image-slot__preview" data-image-preview="bathroom">No bathroom photo uploaded.</div>
            </label>
            <button type="button" class="button-ghost admin-image-slot__remove" data-image-remove="bathroom">Remove Photo</button>
          </div>

          <div class="admin-image-slot">
            <label class="admin-image-slot__field">
              <span class="admin-image-slot__label">Kitchen</span>
              <input type="file" accept="image/*" data-image-label="kitchen" />
              <div class="admin-image-slot__preview" data-image-preview="kitchen">No kitchen photo uploaded.</div>
            </label>
            <button type="button" class="button-ghost admin-image-slot__remove" data-image-remove="kitchen">Remove Photo</button>
          </div>

          <div class="admin-image-slot">
            <label class="admin-image-slot__field">
              <span class="admin-image-slot__label">Living Room</span>
              <input type="file" accept="image/*" data-image-label="living room" />
              <div class="admin-image-slot__preview" data-image-preview="living room">No living room photo uploaded.</div>
            </label>
            <button type="button" class="button-ghost admin-image-slot__remove" data-image-remove="living room">Remove Photo</button>
          </div>

          <div class="admin-image-slot">
            <label class="admin-image-slot__field">
              <span class="admin-image-slot__label">Cover Photo</span>
              <input type="file" accept="image/*" data-image-label="cover photo" />
              <div class="admin-image-slot__preview" data-image-preview="cover photo">No cover photo uploaded.</div>
            </label>
            <button type="button" class="button-ghost admin-image-slot__remove" data-image-remove="cover photo">Remove Photo</button>
          </div>
        </div>
      </section>

      <label>
        Title
        <input type="text" name="title" required />
      </label>

      <label>
        Description
        <textarea name="description" rows="4" required></textarea>
      </label>

      <label>
        Location
        <input type="text" name="location" required />
      </label>

      <label>
        Amenities (text)
        <input type="text" name="amenities" placeholder="WiFi, Aircon, Desk" required />
      </label>

      <label>
        Price (PHP/month)
        <input type="number" name="price" min="0" required />
      </label>

      <label>
        Contact Number
        <input type="text" name="contactNumber" required />
      </label>

      <button type="submit">Add Listing</button>
      <p id="status" class="status"></p>
    </form>

    <section class="card">
      <h2>Manage Listings</h2>
      <div id="adminListings"></div>
    </section>

  </main>

  <script src="admin.js"></script>
</body>
</html>
