<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoZi Admin - Add Listing</title>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>CoZi Admin</h1>

    <form id="listingForm" class="card">
      <section class="admin-image-upload">
        <div class="admin-image-upload__copy">
          <p class="section-label">Listing Photos</p>
          <p class="admin-image-upload__hint">
            Upload up to 5 images using these fixed labels: bedroom, bathroom, kitchen, living room, and cover photo.
          </p>
        </div>

        <div class="admin-image-grid">
          <div class="admin-image-slot">
            <label class="admin-image-slot__field">
              <span class="admin-image-slot__label">Bedroom</span>
              <input type="file" accept="image/*" data-image-label="bedroom" />
              <div class="admin-image-slot__preview" data-image-preview="bedroom">No bedroom photo uploaded.</div>
            </label>
            <button type="button" class="button-ghost admin-image-slot__remove" data-image-remove="bedroom">Remove Photo</button>
          </div>

          <div class="admin-image-slot">
            <label class="admin-image-slot__field">
              <span class="admin-image-slot__label">Bathroom</span>
              <input type="file" accept="image/*" data-image-label="bathroom" />
              <div class="admin-image-slot__preview" data-image-preview="bathroom">No bathroom photo uploaded.</div>
            </label>
            <button type="button" class="button-ghost admin-image-slot__remove" data-image-remove="bathroom">Remove Photo</button>
          </div>

          <div class="admin-image-slot">
            <label class="admin-image-slot__field">
              <span class="admin-image-slot__label">Kitchen</span>
              <input type="file" accept="image/*" data-image-label="kitchen" />
              <div class="admin-image-slot__preview" data-image-preview="kitchen">No kitchen photo uploaded.</div>
            </label>
            <button type="button" class="button-ghost admin-image-slot__remove" data-image-remove="kitchen">Remove Photo</button>
          </div>

          <div class="admin-image-slot">
            <label class="admin-image-slot__field">
              <span class="admin-image-slot__label">Living Room</span>
              <input type="file" accept="image/*" data-image-label="living room" />
              <div class="admin-image-slot__preview" data-image-preview="living room">No living room photo uploaded.</div>
            </label>
            <button type="button" class="button-ghost admin-image-slot__remove" data-image-remove="living room">Remove Photo</button>
          </div>

          <div class="admin-image-slot">
            <label class="admin-image-slot__field">
              <span class="admin-image-slot__label">Cover Photo</span>
              <input type="file" accept="image/*" data-image-label="cover photo" />
              <div class="admin-image-slot__preview" data-image-preview="cover photo">No cover photo uploaded.</div>
            </label>
            <button type="button" class="button-ghost admin-image-slot__remove" data-image-remove="cover photo">Remove Photo</button>
          </div>
        </div>
      </section>

      <!-- Title -->
      <div class="admin-field-section">
        <label class="admin-field">
          <span class="admin-field__label">Title <span class="admin-field-counter" id="titleCounter">0/80</span></span>
          <input type="text" id="titleInput" maxlength="80" required placeholder="e.g., Fully Furnished Studio near ADMU" />
        </label>
      </div>

      <!-- Description -->
      <div class="admin-field-section">
        <label class="admin-field">
          <span class="admin-field__label">Description</span>
          <textarea id="descriptionInput" rows="4" required placeholder="Describe the unit, its highlights, and proximity to campus..."></textarea>
        </label>
      </div>

      <!-- Location -->
      <div class="admin-field-section">
        <p class="section-label">Location</p>
        <div class="admin-field-row">
          <label class="admin-field">
            <span class="admin-field__label">Building / Property Name</span>
            <input type="text" id="buildingName" required placeholder="e.g., Katipunan Residences" />
          </label>
          <label class="admin-field">
            <span class="admin-field__label">Area / Barangay</span>
            <input type="text" id="areaInput" required placeholder="e.g., Loyola Heights, Quezon City" />
          </label>
        </div>
      </div>

      <!-- Unit Details -->
      <div class="admin-field-section">
        <p class="section-label">Unit Details</p>
        <div class="admin-field-row">
          <label class="admin-field">
            <span class="admin-field__label">Bedrooms</span>
            <select id="bedroomsInput" required>
              <option value="">Select...</option>
              <option value="Studio">Studio</option>
              <option value="1BR">1BR</option>
              <option value="2BR">2BR</option>
              <option value="3BR+">3BR+</option>
            </select>
          </label>
          <label class="admin-field">
            <span class="admin-field__label">Furnished Status</span>
            <select id="furnishedInput" required>
              <option value="">Select...</option>
              <option value="Fully Furnished">Fully Furnished</option>
              <option value="Semi-Furnished">Semi-Furnished</option>
              <option value="Bare">Bare</option>
              <option value="Unfurnished">Unfurnished</option>
            </select>
          </label>
        </div>
        <div class="admin-field-row">
          <label class="admin-field">
            <span class="admin-field__label">Size (sqm)</span>
            <input type="number" id="sizeInput" min="1" placeholder="e.g., 28" />
          </label>
          <label class="admin-field">
            <span class="admin-field__label">Floor Number</span>
            <input type="number" id="floorInput" min="1" placeholder="e.g., 5" />
          </label>
        </div>
      </div>

      <!-- Amenities -->
      <div class="admin-field-section">
        <p class="section-label">Amenities</p>
        <div class="admin-amenity-grid">
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Aircon" /> Aircon</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="WiFi" /> WiFi</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Parking" /> Parking</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Pool" /> Pool</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Gym" /> Gym</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Study Hall" /> Study Hall</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Function Hall" /> Function Hall</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="CCTV" /> CCTV</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Generator" /> Generator</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Elevator" /> Elevator</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Furnished" /> Furnished</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Washer/Dryer" /> Washer/Dryer</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Water included" /> Water included</label>
          <label class="admin-amenity-item"><input type="checkbox" name="amenity" value="Electric included" /> Electricity included</label>
        </div>
        <label class="admin-field" style="margin-top:12px;">
          <span class="admin-field__label">Custom amenities <span class="admin-field-hint">(comma-separated)</span></span>
          <input type="text" id="customAmenities" placeholder="e.g., Balcony, Study nook, Netflix included" />
        </label>
      </div>

      <!-- Price -->
      <div class="admin-field-section">
        <label class="admin-field">
          <span class="admin-field__label">Price (PHP/month)</span>
          <input type="number" id="priceInput" min="0" required placeholder="e.g., 15000" />
        </label>
        <p class="admin-price-preview" id="pricePreview">Enter a price to see the formatted amount.</p>
      </div>

      <!-- Contact Number -->
      <div class="admin-field-section">
        <label class="admin-field">
          <span class="admin-field__label">Contact Number <span class="admin-field-hint">(PH mobile, e.g. 09171234567)</span></span>
          <input type="tel" id="contactInput" maxlength="11" placeholder="09XXXXXXXXX" required />
        </label>
        <p class="admin-field-hint" id="contactHint"></p>
      </div>

      <button type="submit">Add Listing</button>
      <p id="status" class="status"></p>
    </form>

    <section class="card">
      <h2>Manage Listings</h2>
      <div id="adminListings"></div>
    </section>

  </main>

  <script src="admin.js"></script>
</body>
</html>
